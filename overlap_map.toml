# paclens overlap map
#
# Authoritative Flatpak app ID to pacman package name mappings.
# Bundled into the binary via include_str!() and carries Confidence::Confirmed.
# Users can add their own via config.toml [[overlap.extra_mappings]].
#
# Fields:
#   flatpak_id  (required)  Flatpak application ID
#   pacman_name (required)  primary pacman package name
#   alt_names   (optional)  alternative pacman names, checked if primary not found
#   notes       (optional)  human context, not parsed at runtime
#
# Rules:
#   - only verified mappings belong here
#   - a missing entry is safer than a wrong one


# --- Browsers ---

[[mapping]]
flatpak_id  = "org.mozilla.firefox"
pacman_name = "firefox"

[[mapping]]
flatpak_id  = "org.chromium.Chromium"
pacman_name = "chromium"

[[mapping]]
flatpak_id  = "com.google.Chrome"
pacman_name = "google-chrome"
alt_names   = ["google-chrome-stable"]
notes       = "AUR"

[[mapping]]
